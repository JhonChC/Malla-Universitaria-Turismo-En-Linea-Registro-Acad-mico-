<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malla Curricular — Licenciatura en Turismo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14;
            --bg2: #13161e;
            --bg3: #1a1e2a;
            --surface: #1e2330;
            --surface2: #242838;
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(255,255,255,0.15);
            --text: #e8eaf0;
            --text-muted: #7a8099;
            --text-dim: #4a506a;
            --accent: #6c8fff;
            --accent2: #a78bfa;
            --gold: #f0c060;
            --gold2: #ffd980;
            --green: #34d399;
            --red: #f87171;

            /* Semester palette — rich jewel tones */
            --sem-pre:    #4f6ef7;
            --sem-1:      #10b981;
            --sem-2:      #f59e0b;
            --sem-3:      #8b5cf6;
            --sem-4:      #ec4899;
            --sem-5:      #06b6d4;
            --sem-6:      #ef4444;
            --sem-7:      #22c55e;
            --sem-8:      #3b82f6;
            --sem-9:      #94a3b8;
            --sem-ingles: #14b8a6;
            --sem-comp:   #7c3aed;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px 24px;
            overflow-x: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(108,143,255,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── HEADER ─── */
        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .header-eyebrow {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            font-weight: 900;
            letter-spacing: 6px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2em, 5vw, 3.2em);
            font-weight: 900;
            background: linear-gradient(135deg, #e8eaf0 30%, #6c8fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .header-sub {
            color: var(--text-muted);
            font-size: 0.9em;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .header-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            margin: 20px auto 0;
            border-radius: 2px;
        }

        /* ─── STATS ─── */
        .stats {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 10px;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 1200px) {
            .stats { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 600px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 14px 12px;
            border-radius: 10px;
            text-align: center;
            transition: border-color 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
        }

        .stat-card:nth-child(1)::before { background: var(--accent); }
        .stat-card:nth-child(2)::before { background: var(--accent2); }
        .stat-card:nth-child(3)::before { background: var(--green); }
        .stat-card:nth-child(4)::before { background: var(--gold); }
        .stat-card:nth-child(5)::before { background: #ec4899; }
        .stat-card:nth-child(6)::before { background: #06b6d4; }
        .stat-card:nth-child(7)::before { background: var(--accent); }
        .stat-card:nth-child(8)::before { background: var(--green); }
        .stat-card:nth-child(9)::before { background: #14b8a6; }

        .stat-card:hover { border-color: var(--border-bright); }

        .stat-card h3 {
            font-size: 0.62em;
            font-weight: 500;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-card .number {
            font-family: 'DM Mono', monospace;
            font-size: 1.5em;
            font-weight: 500;
            color: var(--text);
        }

        /* ─── BARRA DE SCROLL FIJA EN LA PARTE INFERIOR ─── */
        .fixed-scrollbar-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 16px;
            background: var(--bg2);
            border-top: 1px solid var(--border);
            z-index: 999;
            overflow-x: scroll;
            overflow-y: hidden;
        }

        .fixed-scrollbar-inner {
            height: 1px;
        }

        .fixed-scrollbar-wrapper::-webkit-scrollbar {
            height: 10px;
        }

        .fixed-scrollbar-wrapper::-webkit-scrollbar-track {
            background: var(--surface);
        }

        .fixed-scrollbar-wrapper::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 5px;
        }

        .fixed-scrollbar-wrapper::-webkit-scrollbar-thumb:hover {
            background: var(--accent2);
        }

        /* Padding al body para que el contenido no quede tapado por la barra fija */
        body {
            padding-bottom: 24px;
        }

        /* ─── CURRICULUM WRAPPER ─── */
        .curriculum-container {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
            overflow-x: scroll;
            position: relative;
            z-index: 1;
        }

        .curriculum-container::-webkit-scrollbar {
            height: 8px;
        }

        .curriculum-container::-webkit-scrollbar-track {
            background: var(--surface);
            border-radius: 4px;
        }

        .curriculum-container::-webkit-scrollbar-thumb {
            background: var(--border-bright);
            border-radius: 4px;
        }

        .curriculum-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .curriculum-grid {
            display: grid;
            grid-template-columns: 130px repeat(12, minmax(140px, 1fr));
            gap: 12px;
            min-width: 1900px;
        }

        /* ─── TOP HEADER ROW ─── */
        .col-header {
            padding: 10px 8px;
            text-align: center;
            font-family: 'DM Mono', monospace;
            font-size: 0.65em;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .col-header.eje-formativo {
            background: var(--surface);
            color: var(--text-muted);
        }

        .col-header.sem-pre    { background: rgba(79,110,247,0.18);  color: #a0b4ff; border-color: rgba(79,110,247,0.3);  }
        .col-header.sem-1      { background: rgba(16,185,129,0.18);  color: #6ee7b7; border-color: rgba(16,185,129,0.3);  }
        .col-header.sem-2      { background: rgba(245,158,11,0.18);  color: #fcd34d; border-color: rgba(245,158,11,0.3);  }
        .col-header.sem-3      { background: rgba(139,92,246,0.18);  color: #c4b5fd; border-color: rgba(139,92,246,0.3);  }
        .col-header.sem-4      { background: rgba(236,72,153,0.18);  color: #f9a8d4; border-color: rgba(236,72,153,0.3);  }
        .col-header.sem-5      { background: rgba(6,182,212,0.18);   color: #67e8f9; border-color: rgba(6,182,212,0.3);   }
        .col-header.sem-6      { background: rgba(239,68,68,0.18);   color: #fca5a5; border-color: rgba(239,68,68,0.3);   }
        .col-header.sem-7      { background: rgba(34,197,94,0.18);   color: #86efac; border-color: rgba(34,197,94,0.3);   }
        .col-header.sem-8      { background: rgba(59,130,246,0.18);  color: #93c5fd; border-color: rgba(59,130,246,0.3);  }
        .col-header.sem-9      { background: rgba(148,163,184,0.18); color: #cbd5e1; border-color: rgba(148,163,184,0.3); }
        .col-header.sem-ingles { background: rgba(20,184,166,0.18);  color: #5eead4; border-color: rgba(20,184,166,0.3);  }
        .col-header.sem-comp   { background: rgba(124,58,237,0.18);  color: #c4b5fd; border-color: rgba(124,58,237,0.3);  }

        /* ─── UNIT LABELS ─── */
        .unit-label {
            display: flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            background: var(--surface2);
            border: 1px solid var(--border-bright);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 10px;
            padding: 20px 8px;
        }

        /* ─── SEMESTER COLUMNS ─── */
        .semester-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* semester-header removed — replaced by top col-header row */

        /* ─── SUBJECT CARDS ─── */
        .subject-card {
            position: relative;
            height: 160px;
            min-height: 160px;
            max-height: 160px;
            border-radius: 10px;
            padding: 14px 13px 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid transparent;
            transition: transform 0.22s cubic-bezier(.34,1.56,.64,1),
                        box-shadow 0.22s ease,
                        border-color 0.22s ease;
            overflow: hidden;
        }

        .subject-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
            border-radius: 10px;
            pointer-events: none;
        }

        .subject-card:hover {
            transform: translateY(-4px) scale(1.012);
            box-shadow: 0 12px 32px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.2);
        }

        .subject-card:hover::after {
            background: rgba(255,255,255,0.03);
        }

        .subject-card.blocked {
            opacity: 0.38;
            cursor: not-allowed;
            filter: grayscale(0.4);
        }

        .subject-card.blocked:hover {
            transform: none;
            box-shadow: none;
        }

        .subject-card.approved {
            box-shadow: inset 0 0 0 2px var(--gold), 0 0 20px rgba(240,192,96,0.15);
        }

        /* Transversal badge */
        .subject-card.transversal::before {
            content: 'TRANSVERSAL';
            position: absolute;
            top: -1px;
            right: 10px;
            background: var(--red);
            color: white;
            padding: 2px 7px;
            border-radius: 0 0 5px 5px;
            font-size: 0.55em;
            font-family: 'DM Mono', monospace;
            letter-spacing: 1px;
            font-weight: 500;
            z-index: 2;
        }

        /* Semester color backgrounds */
        .sem-pre    { background: linear-gradient(145deg, #1e2f6e, #2a3d8a); }
        .sem-1      { background: linear-gradient(145deg, #0c4a36, #145e45); }
        .sem-2      { background: linear-gradient(145deg, #5c3a0a, #7a4f10); }
        .sem-3      { background: linear-gradient(145deg, #3b1f6e, #4e2990); }
        .sem-4      { background: linear-gradient(145deg, #6e1045, #8a1558); }
        .sem-5      { background: linear-gradient(145deg, #0a4050, #0d566a); }
        .sem-6      { background: linear-gradient(145deg, #6e1515, #8a1a1a); }
        .sem-7      { background: linear-gradient(145deg, #0e4a25, #135c30); }
        .sem-8      { background: linear-gradient(145deg, #1030600, #153a78); }
        .sem-8      { background: linear-gradient(145deg, #10306a, #153a82); }
        .sem-9      { background: linear-gradient(145deg, #2a2e3e, #343848); }
        .sem-ingles { background: linear-gradient(145deg, #0a3d39, #0e504a); }
        .sem-comp   { background: linear-gradient(145deg, #2e1060, #3a1478); }

        /* Approved overlay */
        .subject-card.approved::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(240,192,96,0.08);
            pointer-events: none;
        }

        .subject-card.transversal.approved::before {
            /* override — transversal uses text before, so approved uses box-shadow only */
        }

        /* Card internals */
        .status-icon {
            position: absolute;
            top: 9px;
            right: 9px;
            font-size: 1em;
            z-index: 2;
            line-height: 1;
        }

        .subject-icon {
            font-size: 1.8em;
            margin-bottom: 4px;
            text-align: center;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .subject-name {
            font-size: 0.78em;
            font-weight: 600;
            text-align: center;
            line-height: 1.25;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.93);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .subject-details {
            font-size: 0.72em;
            color: rgba(255,255,255,0.6);
        }

        .subject-detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
        }

        .subject-detail-row strong {
            font-family: 'DM Mono', monospace;
            color: rgba(255,255,255,0.85);
            font-size: 1.05em;
        }

        .info-btn {
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            width: 17px;
            height: 17px;
            font-size: 0.75em;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 700;
        }

        .info-btn:hover {
            background: rgba(255,255,255,0.25);
            color: white;
        }

        /* ─── MODAL ─── */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg2);
            border: 1px solid var(--border-bright);
            border-radius: 14px;
            max-width: 660px;
            width: 90%;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }

        .modal-header {
            padding: 22px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
        }

        .modal-header span {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85em;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .modal-body {
            overflow-y: auto;
            max-height: 55vh;
        }

        .modal-footer {
            padding: 16px 28px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            background: var(--surface);
        }

        .btn-close-modal {
            background: var(--accent);
            color: white;
            border: none;
            padding: 9px 26px;
            border-radius: 7px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 0.85em;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-close-modal:hover { opacity: 0.85; }

        .prerequisites-table {
            width: 100%;
            border-collapse: collapse;
        }

        .prerequisites-table th {
            padding: 13px 20px;
            text-align: left;
            font-size: 0.75em;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        .prerequisites-table td {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-size: 0.88em;
        }

        .prerequisites-table tr:last-child td { border-bottom: none; }

        .prerequisites-table tr:hover td {
            background: var(--surface2);
        }

        .level-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.78em;
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            background: rgba(108,143,255,0.15);
            color: var(--accent);
            border: 1px solid rgba(108,143,255,0.25);
        }

        .close {
            color: var(--text-muted);
            font-size: 22px;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
            transition: color 0.2s;
        }

        .close:hover { color: var(--text); }

        /* ─── CELEBRATION ─── */
        .celebration {
            display: none;
            position: fixed;
            z-index: 2000;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }

        .celebration-content {
            background: var(--bg2);
            border: 1px solid var(--border-bright);
            border-radius: 16px;
            max-width: 460px;
            width: 90%;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 80px rgba(240,192,96,0.1);
        }

        .celebration-header {
            background: linear-gradient(135deg, #1a1060, #2e1878);
            color: var(--gold);
            padding: 22px 28px;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.3em;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .celebration-body {
            padding: 36px 28px;
            text-align: center;
        }

        .celebration-icon {
            font-size: 4.5em;
            margin-bottom: 18px;
            animation: celebrate 0.7s cubic-bezier(.34,1.56,.64,1);
        }

        @keyframes celebrate {
            0% { transform: scale(0.5) rotate(-15deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .celebration-title {
            font-size: 1.15em;
            color: var(--text);
            font-weight: 500;
            line-height: 1.5;
        }

        .celebration-footer {
            padding: 18px 28px;
            display: flex;
            justify-content: center;
            gap: 12px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        .btn-celebration {
            padding: 10px 28px;
            border: none;
            border-radius: 7px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-accept {
            background: var(--gold);
            color: #1a1000;
        }

        .btn-close-celebration {
            background: var(--surface2);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-celebration:hover { opacity: 0.85; }

        /* No prereqs message */
        .no-prereqs {
            padding: 36px 28px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-eyebrow">UNEMI</div>
        <h1>Licenciatura en Turismo</h1>
        <p class="header-sub">Malla Curricular Interactiva</p>
        <div class="header-line"></div>
    </div>

    <div class="stats">
        <div class="stat-card"><h3>Total Asignaturas</h3><div class="number">57</div></div>
        <div class="stat-card"><h3>Total Módulos</h3><div class="number">9</div></div>
        <div class="stat-card"><h3>Materias Aprobadas</h3><div class="number" id="materiasAprobadas">0</div></div>
        <div class="stat-card"><h3>Créditos Malla</h3><div class="number" id="creditosMalla">0</div></div>
        <div class="stat-card"><h3>Módulos Aprobados</h3><div class="number" id="modulosAprobados">0</div></div>
        <div class="stat-card"><h3>Créditos Módulos</h3><div class="number" id="creditosModulos">0</div></div>
        <div class="stat-card"><h3>Créditos Totales</h3><div class="number" id="creditosTotales">0</div></div>
        <div class="stat-card"><h3>Horas Prácticas</h3><div class="number" id="horasPracticas">0/240</div></div>
        <div class="stat-card"><h3>Horas Vinculación</h3><div class="number" id="horasVinculacion">0/160</div></div>
    </div>

    <div class="curriculum-container">
        <div class="curriculum-grid" id="curriculum"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalTitle"></span>
                <button class="close">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn-close-modal" onclick="document.getElementById('modal').style.display='none'">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Celebration -->
    <div id="celebration" class="celebration">
        <div class="celebration-content">
            <div class="celebration-header" id="celebrationHeader"></div>
            <div class="celebration-body" id="celebrationBody"></div>

            ],

                {id:'inga1m',name:'Inglés A1-', icon:'🔴', credits:2.08, req:[]},

                {id:'inga2', name:'Inglés A2',  icon:'🟡', credits:2.08, req:['inga1']},
                {id:'ingb1', name:'Inglés B1',  icon:'🟢', credits:2.08, req:['inga2']},
                {id:'ingb2', name:'Inglés B2',  icon:'🔵', credits:2.08, req:['ingb1']},
                {id:'ingc1', name:'Inglés C1',  icon:'🟣', credits:2.08, req:['ingb2']},
                {id:'ingc2', name:'Inglés C2',  icon:'🟤', credits:2.08, req:['ingc1']}
            ],
            modComp: [
                {id:'comp1',name:'Windows - Word - Internet', icon:'🪟', credits:8, req:[]},
                {id:'comp2',name:'Excel - PowerPoint',        icon:'📊', credits:8, req:['comp1']}
            ]
        };

        let approvedSubjects = {};
        let completedMilestones = {};

        // Versión de datos — cambiar este valor fuerza reset del localStorage
        const DATA_VERSION = 'v5';

        try {
            const storedVersion = localStorage.getItem('mallaVersion');
            if (storedVersion !== DATA_VERSION) {
                // Datos cambiaron — limpiar todo
                localStorage.removeItem('approvedSubjects');
                localStorage.removeItem('completedMilestones');
                localStorage.setItem('mallaVersion', DATA_VERSION);
            }
            const stored = localStorage.getItem('approvedSubjects');
            if (stored) {
                const parsed = JSON.parse(stored);
                // Cargar solo materias aprobadas cuyos prereqs también estén aprobados
                // (dos pasadas para resolver cadenas de dependencia)
                const tempApproved = {};
                Object.keys(parsed).forEach(key => { if (parsed[key] === true) tempApproved[key] = true; });
                // Validar integridad: solo conservar aprobadas si sus prereqs están en tempApproved
                let changed = true;
                while (changed) {
                    changed = false;
                    Object.keys(tempApproved).forEach(id => {
                        const subj = [...subjectsData.pre,...subjectsData.sem1,...subjectsData.sem2,...subjectsData.sem3,...subjectsData.sem4,...subjectsData.sem5,...subjectsData.sem6,...subjectsData.sem7,...subjectsData.sem8,...subjectsData.sem9,...subjectsData.modIngles,...subjectsData.modComp].find(s => s.id === id);
                        if (subj && subj.req.some(r => !tempApproved[r])) {
                            delete tempApproved[id];
                            changed = true;
                        }
                    });
                }
                approvedSubjects = tempApproved;
            }
            const storedMilestones = localStorage.getItem('completedMilestones');
            if (storedMilestones) completedMilestones = JSON.parse(storedMilestones);
        } catch (e) { approvedSubjects = {}; completedMilestones = {}; }

        localStorage.setItem('approvedSubjects', JSON.stringify(approvedSubjects));

        function isBlocked(reqs) {
            if (!reqs || reqs.length === 0) return false;
            return reqs.some(req => !approvedSubjects[req]);
        }

        const allSubjectsList = () => [
            ...subjectsData.pre, ...subjectsData.sem1, ...subjectsData.sem2,
            ...subjectsData.sem3, ...subjectsData.sem4, ...subjectsData.sem5,
            ...subjectsData.sem6, ...subjectsData.sem7, ...subjectsData.sem8,
            ...subjectsData.sem9, ...subjectsData.modIngles, ...subjectsData.modComp
        ];

        function toggleSubject(id) {
            const subject = allSubjectsList().find(s => s.id === id);
            if (!subject) return;
            if (isBlocked(subject.req)) { showModal(id); return; }
            approvedSubjects[id] = !approvedSubjects[id];
            localStorage.setItem('approvedSubjects', JSON.stringify(approvedSubjects));
            render();
            checkMilestones();
        }

        function showModal(id) {
            const subject = allSubjectsList().find(s => s.id === id);
            const semesterMap = {
                pre:'PRE NIVEL',sem1:'1ER NIVEL',sem2:'2DO NIVEL',sem3:'3ER NIVEL',
                sem4:'4TO NIVEL',sem5:'5TO NIVEL',sem6:'6TO NIVEL',sem7:'7MO NIVEL',
                sem8:'8VO NIVEL',sem9:'9NO NIVEL',modIngles:'MÓDULO INGLÉS',modComp:'MÓDULO COMPUTACIÓN'
            };
            function getSemesterLevel(subjectId) {
                for (let key in subjectsData) {
                    if (subjectsData[key].find(s => s.id === subjectId)) return semesterMap[key];
                }
                return '';
            }
            document.getElementById('modalTitle').textContent = 'Precedencias — ' + subject.name.toUpperCase();
            if (subject.req.length === 0) {
                document.getElementById('modalBody').innerHTML = '<div class="no-prereqs">Esta asignatura no tiene prerrequisitos</div>';
            } else {
                let t = '<table class="prerequisites-table"><thead><tr><th>Asignatura</th><th>Nivel</th></tr></thead><tbody>';
                subject.req.forEach(reqId => {
                    const rs = allSubjectsList().find(s => s.id === reqId);
                    if (rs) t += `<tr><td>${rs.name.toUpperCase()}</td><td><span class="level-badge">${getSemesterLevel(reqId)}</span></td></tr>`;
                });
                t += '</tbody></table>';
                document.getElementById('modalBody').innerHTML = t;
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function calculateStats() {
            let creditsMalla = 0, creditsModulos = 0, horasPracticas = 0, horasVinculacion = 0;
            let materiasAprobadas = 0, modulosAprobados = 0;

            const mallaSubjects = [...subjectsData.pre,...subjectsData.sem1,...subjectsData.sem2,...subjectsData.sem3,...subjectsData.sem4,...subjectsData.sem5,...subjectsData.sem6,...subjectsData.sem7,...subjectsData.sem8,...subjectsData.sem9];
            mallaSubjects.forEach(s => {
                if (approvedSubjects[s.id] === true) {
                    materiasAprobadas++;
                    if (s.hours) {
                        if (s.id.startsWith('pp')) horasPracticas += s.hours;
                        else if (s.id.startsWith('pv')) horasVinculacion += s.hours;
                    } else if (s.credits > 0) creditsMalla += s.credits;
                }
            });

            [...subjectsData.modIngles,...subjectsData.modComp].forEach(s => {
                if (approvedSubjects[s.id] === true) {
                    modulosAprobados++;
                    if (s.credits > 0) creditsModulos += s.credits;
                }
            });

            document.getElementById('materiasAprobadas').textContent = materiasAprobadas;
            document.getElementById('modulosAprobados').textContent = modulosAprobados;
            document.getElementById('creditosMalla').textContent = creditsMalla.toFixed(2);
            document.getElementById('creditosModulos').textContent = creditsModulos.toFixed(2);
            document.getElementById('creditosTotales').textContent = (creditsMalla + creditsModulos).toFixed(2);
            document.getElementById('horasPracticas').textContent = horasPracticas + '/240';
            document.getElementById('horasVinculacion').textContent = horasVinculacion + '/160';
        }

        function renderSubject(subject, semClass) {
            const blocked = isBlocked(subject.req);
            const isApproved = approvedSubjects[subject.id] === true && !blocked;
            const isTransversal = subject.transversal || false;

            let cls = `subject-card ${semClass}${isApproved ? ' approved' : ''}${blocked ? ' blocked' : ''}${isTransversal ? ' transversal' : ''}`;
            let statusIcon = isApproved ? '✓' : blocked ? '🔒' : '';

            return `<div class="${cls}" onclick="toggleSubject('${subject.id}')">
                <div class="status-icon">${statusIcon}</div>
                <div class="subject-icon">${subject.icon}</div>
                <div class="subject-name">${subject.name}</div>
                <div class="subject-details">
                    ${subject.credits > 0 ? `<div class="subject-detail-row"><span>Créditos</span><strong>${subject.credits}</strong></div>` : ''}
                    ${subject.hours ? `<div class="subject-detail-row"><span>Horas</span><strong>${subject.hours}</strong></div>` : ''}
                    <div class="subject-detail-row"><span>Prerrequisitos</span>
                        <button class="info-btn" onclick="event.stopPropagation();showModal('${subject.id}')">i</button>
                    </div>
                </div>
            </div>`;
        }

        function render() {
            let html = '';

            // ── ROW 1: Top header row ──
            html += '<div class="col-header eje-formativo" style="grid-column:1;grid-row:1">EJE FORMATIVO</div>';
            html += '<div class="col-header sem-pre"    style="grid-column:2;grid-row:1">PRE</div>';
            html += '<div class="col-header sem-1"      style="grid-column:3;grid-row:1">1.° NIVEL</div>';
            html += '<div class="col-header sem-2"      style="grid-column:4;grid-row:1">2.° NIVEL</div>';
            html += '<div class="col-header sem-3"      style="grid-column:5;grid-row:1">3.° NIVEL</div>';
            html += '<div class="col-header sem-4"      style="grid-column:6;grid-row:1">4.° NIVEL</div>';
            html += '<div class="col-header sem-5"      style="grid-column:7;grid-row:1">5.° NIVEL</div>';
            html += '<div class="col-header sem-6"      style="grid-column:8;grid-row:1">6.° NIVEL</div>';
            html += '<div class="col-header sem-7"      style="grid-column:9;grid-row:1">7.° NIVEL</div>';
            html += '<div class="col-header sem-8"      style="grid-column:10;grid-row:1">8.° NIVEL</div>';
            html += '<div class="col-header sem-9"      style="grid-column:11;grid-row:1">9.° NIVEL</div>';
            html += '<div class="col-header sem-ingles" style="grid-column:12;grid-row:1">INGLÉS</div>';
            html += '<div class="col-header sem-comp"   style="grid-column:13;grid-row:1">COMPUTACIÓN</div>';

            // ── PREUNIVERSITARIA (rows 2–4) ──
            html += '<div class="unit-label" style="grid-column:1;grid-row:2/span 3">PREUNIVERSITARIA</div>';
            html += '<div class="semester-column" style="grid-column:2;grid-row:2/span 3">';
            subjectsData.pre.forEach(s => html += renderSubject(s, 'sem-pre'));
            html += '</div>';

            // ── UNIDAD BÁSICA (rows 5–10) ──
            html += '<div class="unit-label" style="grid-column:1;grid-row:5/span 6">UNIDAD BÁSICA</div>';
            ['sem1','sem2','sem3'].forEach((key, i) => {
                const cls = ['sem-1','sem-2','sem-3'];
                html += `<div class="semester-column" style="grid-column:${3+i};grid-row:5/span 6">`;
                subjectsData[key].forEach(s => html += renderSubject(s, cls[i]));
                html += '</div>';
            });

            // ── UNIDAD PROFESIONAL (rows 11–18) ──
            html += '<div class="unit-label" style="grid-column:1;grid-row:11/span 8">UNIDAD PROFESIONAL</div>';
            ['sem4','sem5','sem6','sem7'].forEach((key, i) => {
                const cls = ['sem-4','sem-5','sem-6','sem-7'];
                html += `<div class="semester-column" style="grid-column:${6+i};grid-row:11/span 8">`;
                subjectsData[key].forEach(s => html += renderSubject(s, cls[i]));
                html += '</div>';
            });
            // Turismo y Gobernanza: en Unidad Profesional pero alineada al fondo (junto a las de Titulación)
            const tyg = subjectsData.sem8.find(s => s.id === 'tyg');
            html += '<div class="semester-column" style="grid-column:10;grid-row:11/span 8;justify-content:flex-end">';
            if (tyg) html += renderSubject(tyg, 'sem-8');
            html += '</div>';

            // ── UNIDAD DE TITULACIÓN (rows 19–25) ──
            // col 10 tiene las 6 materias de sem8 SIN tyg
            // col 11 tiene sem9
            const sem8SinTyg = subjectsData.sem8.filter(s => s.id !== 'tyg');
            html += '<div class="unit-label" style="grid-column:1;grid-row:19/span 7">UNIDAD DE TITULACIÓN</div>';
            html += '<div class="semester-column" style="grid-column:10;grid-row:19/span 7">';
            sem8SinTyg.forEach(s => html += renderSubject(s, 'sem-8'));
            html += '</div>';
            html += '<div class="semester-column" style="grid-column:11;grid-row:19/span 7">';
            subjectsData.sem9.forEach(s => html += renderSubject(s, 'sem-9'));
            html += '</div>';

            // ── MÓDULOS (rows 26–32) ──
            html += '<div class="unit-label" style="grid-column:1;grid-row:26/span 7">MÓDULOS</div>';
            html += '<div class="semester-column" style="grid-column:12;grid-row:26/span 7">';
            subjectsData.modIngles.forEach(s => html += renderSubject(s, 'sem-ingles'));
            html += '</div>';
            html += '<div class="semester-column" style="grid-column:13;grid-row:26/span 7">';
            subjectsData.modComp.forEach(s => html += renderSubject(s, 'sem-comp'));
            html += '</div>';

            document.getElementById('curriculum').innerHTML = html;
            calculateStats();
        }

        function showCelebration(message, icon) {
            document.getElementById('celebrationHeader').textContent = '🎉 ¡FELICITACIONES! 🎉';
            const formattedMsg = message.replace(/\n/g, '<br>');
            document.getElementById('celebrationBody').innerHTML = `<div class="celebration-icon">${icon||'✅'}</div><div class="celebration-title">${formattedMsg}</div>`;
            document.getElementById('celebration').style.display = 'flex';
        }

        function closeCelebration() {
            document.getElementById('celebration').style.display = 'none';
        }

        function checkMilestones() {
            function checkSem(sem, name, key) {
                const all = sem.filter(s => s.credits > 0 || s.hours);
                const done = all.filter(s => approvedSubjects[s.id]);
                const complete = all.length > 0 && all.length === done.length;
                if (complete && !completedMilestones[key]) {
                    completedMilestones[key] = true;
                    localStorage.setItem('completedMilestones', JSON.stringify(completedMilestones));
                    setTimeout(() => showCelebration('Has aprobado ' + name, '🎊'), 300);
                } else if (!complete && completedMilestones[key]) {
                    completedMilestones[key] = false;
                    localStorage.setItem('completedMilestones', JSON.stringify(completedMilestones));
                }
            }

            // PRE — verificación especial (las materias del PRE tienen credits:0 sin hours)
            const preOk = subjectsData.pre.every(s => approvedSubjects[s.id]);
            if (preOk && !completedMilestones.pre) {
                completedMilestones.pre = true;
                localStorage.setItem('completedMilestones', JSON.stringify(completedMilestones));
                setTimeout(() => showCelebration(
                    '¡Completaste la Unidad Preuniversitaria!\nEl primer paso siempre es el más importante. Ya demostraste que tienes todo para llegar lejos. ¡Adelante, el camino apenas comienza! 🚀',
                    '🌟'
                ), 300);
            } else if (!preOk && completedMilestones.pre) {
                completedMilestones.pre = false;
                localStorage.setItem('completedMilestones', JSON.stringify(completedMilestones));
            }
            checkSem(subjectsData.sem1,'el 1er Semestre','sem1');
            checkSem(subjectsData.sem2,'el 2do Semestre','sem2');
            checkSem(subjectsData.sem3,'el 3er Semestre','sem3');
            checkSem(subjectsData.sem4,'el 4to Semestre','sem4');
            checkSem(subjectsData.sem5,'el 5to Semestre','sem5');
            checkSem(subjectsData.sem6,'el 6to Semestre','sem6');
            checkSem(subjectsData.sem7,'el 7mo Semestre','sem7');
            checkSem(subjectsData.sem8,'el 8vo Semestre','sem8');
            checkSem(subjectsData.sem9,'el 9no Semestre','sem9');

            const inglesOk = subjectsData.modIngles.every(s => approvedSubjects[s.id]);
            if (inglesOk && !completedMilestones.ingles) {
                completedMilestones.ingles = true;
                localStorage.setItem('completedMilestones', JSON.stringify(completedMilestones));
                setTimeout(() => showCelebration('Has aprobado todos los módulos de Inglés', '🌐'), 300);
            } else if (!inglesOk && completedMilestones.ingles) {
                completedMilestones.ingles = false;
                localStorage.setItem('completedMilestones', JSON.stringify(completedMilestones));
            }

            const compOk = subjectsData.modComp.every(s => approvedSubjects[s.id]);
            if (compOk && !completedMilestones.comp) {
                completedMilestones.comp = true;
                localStorage.setItem('completedMilestones', JSON.stringify(completedMilestones));
                setTimeout(() => showCelebration('Has aprobado todos los módulos de Computación', '💻'), 300);
            } else if (!compOk && completedMilestones.comp) {
                completedMilestones.comp = false;
                localStorage.setItem('completedMilestones', JSON.stringify(completedMilestones));
            }

            const ppSubjects = [...subjectsData.sem5,...subjectsData.sem6,...subjectsData.sem7].filter(s => s.id.startsWith('pp'));
            const ppOk = ppSubjects.every(s => approvedSubjects[s.id]);
            if (ppOk && !completedMilestones.practicas) {
                completedMilestones.practicas = true;
                localStorage.setItem('completedMilestones', JSON.stringify(completedMilestones));
                setTimeout(() => showCelebration('Has completado todas tus horas de Prácticas Pre Profesionales', '💼'), 300);
            } else if (!ppOk && completedMilestones.practicas) {
                completedMilestones.practicas = false;
                localStorage.setItem('completedMilestones', JSON.stringify(completedMilestones));
            }

            const pvSubjects = [...subjectsData.sem8,...subjectsData.sem9].filter(s => s.id.startsWith('pv'));
            const pvOk = pvSubjects.every(s => approvedSubjects[s.id]);
            if (pvOk && !completedMilestones.vinculacion) {
                completedMilestones.vinculacion = true;
                localStorage.setItem('completedMilestones', JSON.stringify(completedMilestones));
                setTimeout(() => showCelebration('Has completado todas tus horas de tu Proyecto de Vinculación', '🔗'), 300);
            } else if (!pvOk && completedMilestones.vinculacion) {
                completedMilestones.vinculacion = false;
                localStorage.setItem('completedMilestones', JSON.stringify(completedMilestones));
            }

            const allOk = allSubjectsList().every(s => approvedSubjects[s.id]);
            if (allOk && !completedMilestones.carrera) {
                completedMilestones.carrera = true;
                localStorage.setItem('completedMilestones', JSON.stringify(completedMilestones));
                setTimeout(() => showCelebration('¡HAS COMPLETADO TU CARRERA!', '🎓'), 300);
            } else if (!allOk && completedMilestones.carrera) {
                completedMilestones.carrera = false;
                localStorage.setItem('completedMilestones', JSON.stringify(completedMilestones));
            }
        }

        document.querySelector('.close').onclick = () => document.getElementById('modal').style.display = 'none';
        window.onclick = e => { if (e.target == document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };

        render();
    </script>
    <!-- Barra de scroll horizontal fija -->
    <div class="fixed-scrollbar-wrapper" id="fixedScrollbar">
        <div class="fixed-scrollbar-inner" id="fixedScrollbarInner"></div>
    </div>

    <script>
        // Sincronizar barra fija con el curriculum-container
        const container = document.querySelector('.curriculum-container');
        const fixedBar  = document.getElementById('fixedScrollbar');
        const fixedInner = document.getElementById('fixedScrollbarInner');

        function syncInnerWidth() {
            fixedInner.style.width = container.scrollWidth + 'px';
        }

        // Scroll del contenedor → mueve la barra fija
        container.addEventListener('scroll', () => {
            fixedBar.scrollLeft = container.scrollLeft;
        });

        // Scroll de la barra fija → mueve el contenedor
        fixedBar.addEventListener('scroll', () => {
            container.scrollLeft = fixedBar.scrollLeft;
        });

        // Ajustar ancho al cargar y al redimensionar
        syncInnerWidth();
        window.addEventListener('resize', syncInnerWidth);

        // También sincronizar tras render (el grid puede cambiar de tamaño)
        const origRender = render;
        const observer = new MutationObserver(syncInnerWidth);
        observer.observe(document.getElementById('curriculum'), { childList: true, subtree: false });
    </script>
